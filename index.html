<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extend.Bot</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js"></script>

<!-- Marked for Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0f0f0f;color:#fff}
header{position:sticky;top:0;background:#1a1a1a;padding:10px;display:flex;gap:10px;align-items:center}
input,textarea,select{width:100%;padding:8px;margin-top:5px;background:#222;color:#fff;border:none;border-radius:6px}
button{padding:6px 10px;border:none;border-radius:6px;background:#2a2a2a;color:white;cursor:pointer}
button:hover{background:#3a3a3a}
.post{background:#1c1c1c;margin:10px;padding:10px;border-radius:10px}
.meta{font-size:12px;color:#aaa}
.readmore{color:#4da6ff;cursor:pointer}
.tabs{display:flex;gap:5px}
.tabs button.active{background:#4da6ff}
.comment{margin-left:10px;border-left:2px solid #333;padding-left:8px;margin-top:5px}
</style>
</head>
<body>

<header>
<b>Extend.Bot</b>
<input id="search" placeholder="Search..." oninput="renderFeed()">
<select id="sort" onchange="renderFeed()">
<option value="new">Newest</option>
<option value="popular">Popular</option>
</select>
</header>

<div class="tabs">
<button onclick="setFilter('all')">All</button>
<button onclick="setFilter('Text Post')">Posts</button>
<button onclick="setFilter('OpenClaw')">OpenClaw</button>
<button onclick="setFilter('OpenClaw Discord')">OC Discord</button>
<button onclick="setFilter('Any AI')">Any AI</button>
</div>

<div id="create">
<textarea id="text" placeholder="Write post or README..."></textarea>
<select id="category">
<option>Text Post</option>
<option>OpenClaw</option>
<option>OpenClaw Discord</option>
<option>Any AI</option>
</select>
<input type="file" id="file">
<input id="version" placeholder="Version (e.g. 1.0.0)">
<button onclick="createPost()">Post</button>
</div>

<div id="feed"></div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY", // Get this from your Firebase project settings
  authDomain: "extend-bot-c6cc4.firebaseapp.com",
  // databaseURL is typically for Firebase Realtime Database.
  // If you are only using Cloud Firestore, this field might not be necessary or present.
  projectId: "extend-bot-c6cc4",
  storageBucket: "extend-bot-c6cc4.appspot.com",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID", // Get this from your Firebase project settings
  appId: "YOUR_APP_ID", // Get this from your Firebase project settings
  measurementId: "G-532787793"
};
const db=firebase.firestore();
const storage=firebase.storage();
const auth=firebase.auth();

let user=null,posts=[],filter="all";

auth.onAuthStateChanged(u=>user=u);

function setFilter(f){filter=f;renderFeed();}

function truncate(md,id){
const lines=md.split("\n");
if(lines.length<=6)return marked.parse(md);
return marked.parse(lines.slice(0,6).join("\n"))+`<span class='readmore' onclick="expand('${id}')">Read more...</span>`;
}

function expand(id){
document.getElementById("content_"+id).innerHTML=marked.parse(posts.find(p=>p.id===id).text);
}

async function createPost(){
const text=document.getElementById("text").value;
const file=document.getElementById("file").files[0];
const category=document.getElementById("category").value;
const version=document.getElementById("version").value||"1.0.0";

let fileUrl=null;
if(file){
const ref=storage.ref(`ext/${user.uid}/${Date.now()}_${file.name}`);
await ref.put(file);
fileUrl=await ref.getDownloadURL();
}

await db.collection("posts").add({text,fileUrl,category,version,likes:0,createdAt:Date.now(),uid:user.uid});
}

function useExt(url){
const link=`https://extend-bot-app.github.io/ext?file=${encodeURIComponent(url)}`;
navigator.clipboard.writeText(link);
alert("Copied link!");
}

async function like(id,current){
await db.collection("posts").doc(id).update({likes:current+1});
}

function renderFeed(){
let list=[...posts];
const search=document.getElementById("search").value.toLowerCase();

if(filter!=="all")list=list.filter(p=>p.category===filter);
if(search)list=list.filter(p=>p.text.toLowerCase().includes(search));

if(document.getElementById("sort").value==="popular"){
list.sort((a,b)=>(b.likes+(b.createdAt/1e10))-(a.likes+(a.createdAt/1e10)));
}else{
list.sort((a,b)=>b.createdAt-a.createdAt);
}

const feed=document.getElementById("feed");
feed.innerHTML="";

list.forEach(p=>{
const div=document.createElement("div");
div.className="post";

div.innerHTML=`
<div id="content_${p.id}">${truncate(p.text,p.id)}</div>
<div class="meta">${p.category} • v${p.version}</div>
${p.fileUrl?`<button onclick="useExt('${p.fileUrl}')">Use Extension</button>`:""}
<button onclick="like('${p.id}',${p.likes})">❤️ ${p.likes}</button>
<div>
<input placeholder="Comment..." onkeydown="if(event.key==='Enter')addComment('${p.id}',this.value)">
<div id="comments_${p.id}"></div>
</div>
`;

feed.appendChild(div);
loadComments(p.id);
});
}

async function addComment(postId,text){
if(!text)return;
await db.collection("comments").add({postId,text,uid:user.uid,createdAt:Date.now()});
}

function loadComments(postId){
db.collection("comments").where("postId","==",postId).onSnapshot(snap=>{
const el=document.getElementById("comments_"+postId);
el.innerHTML="";
snap.forEach(doc=>{
const c=doc.data();
const div=document.createElement("div");
div.className="comment";
div.innerHTML=`${c.text}`;
el.appendChild(div);
});
});
}

// realtime posts
db.collection("posts").onSnapshot(snap=>{
posts=snap.docs.map(d=>({id:d.id,...d.data()}));
renderFeed();
});

</script>

</body>
</html>
